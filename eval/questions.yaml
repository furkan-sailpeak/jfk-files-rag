- id: biographical_jim_garrison
  category: biographical
  question: "Who was Jim Garrison?"
  query_type_expected: simple
  reference_evidence:
    - filename: 124-10273-10289_redacted.pdf
      page: 640
    - filename: 104-10305-10000.pdf
      page: 106
    - filename: 104-10337-10001.pdf
      page: 195
  reference_answer: >
    Jim Garrison was the New Orleans District Attorney who, beginning in December 1966, conducted
    an investigation of the assassination of President Kennedy. He attempted to develop evidence
    that David William Ferrie, Clay Shaw, Lee Harvey Oswald, and anti-Castro Cubans had conspired
    to kill the President, and he prosecuted Clay Shaw in 1966-1969. Garrison's conspiracy theory
    was later described by his own former chief investigator, William H. Gurvich, as a "baseless
    fraud" and "a figment of the D.A.'s imagination."
  key_facts:
    - "Jim Garrison was the New Orleans District Attorney"
    - "He began an investigation of the JFK assassination in December 1966"
    - "He alleged a conspiracy involving Ferrie, Clay Shaw, Oswald, and anti-Castro Cubans"
    - "He prosecuted Clay Shaw between 1966 and 1969"
    - "His former chief investigator William H. Gurvich called the theory a 'baseless fraud'"

- id: analytical_cia_surveillance_oswald
  category: analytical
  question: "What did the HSCA conclude about the CIA's photographic and electronic surveillance of Oswald in Mexico City, and how forthcoming was the CIA with materials?"
  query_type_expected: research
  reference_evidence:
    - filename: 180-10110-10484.pdf
      page: 119
    - filename: 180-10110-10484.pdf
      page: 19
    - filename: 180-10110-10484.pdf
      page: 35
  reference_answer: >
    The HSCA investigated both the CIA's general photographic surveillance operations in Mexico City
    in 1963 and the specific question of whether Oswald had been photographed. The Committee
    concluded that the CIA's photo-surveillance operations in Mexico City "probably obtained a
    photograph of Lee Harvey Oswald" entering either or both of the Soviet and Cuban compounds.
    However, the Committee also expressed "deep concern" that the Agency may have withheld
    photographic materials highly relevant to the investigation, and found that outside of areas
    involving sensitive sources and methods (such as electronic and photographic surveillance of the
    Soviet and Cuban diplomatic compounds), information from Mexico was generally relayed accurately
    and expeditiously to the Warren Commission.
  key_facts:
    - "HSCA investigated CIA photo-surveillance operations in Mexico City in 1963"
    - "HSCA concluded CIA probably obtained a photograph of Oswald at the Soviet or Cuban compounds"
    - "HSCA expressed concern about possible CIA withholding of photographic materials"
    - "Information outside sensitive sources/methods was generally relayed accurately to the Warren Commission"

- id: analytical_warren_ruby_hunts
  category: analytical
  question: "What links do the retrieved documents draw between Jack Ruby's circle, the Hunt family in Dallas, and the events surrounding the assassination?"
  query_type_expected: research
  reference_evidence:
    - filename: 157-10014-10242.pdf
      page: 44
    - filename: 157-10014-10242.pdf
      page: 384
  reference_answer: >
    The retrieved documents, citing recollections from Paul Rothermel - a former FBI agent who was
    Director of Security for the Hunt Oil Company in Dallas - note that Jim Braden (Brading) visited
    the Hunt offices on November 21 in the company of three other men, including Roger Bauman,
    described as "Brading's old Mafia friend," along with Morgan Brown and Duane Nowlin. Rothermel
    was later fired by H.L. Hunt's sons after reports surfaced that he was "suspicious" of a possible
    Hunt connection to the assassination. The previews primarily establish the Braden-Hunt office
    visit and Rothermel's subsequent firing rather than a fully-developed conspiracy narrative.
  key_facts:
    - "Paul Rothermel was a former FBI agent and Director of Security for the Hunt Oil Company"
    - "Rothermel recalled Braden visiting the Hunt offices on November 21"
    - "Braden visited with Roger Bauman (described as Braden's old Mafia friend), Morgan Brown, and Duane Nowlin"
    - "Rothermel was later fired by H.L. Hunt's sons over his suspicions of a possible Hunt connection"

- id: analytical_kgb_oswald_conclusion
  category: analytical
  question: "What did U.S. investigators ultimately conclude about whether Lee Harvey Oswald was a Soviet (KGB) agent?"
  query_type_expected: research
  reference_evidence:
    - filename: 104-10332-10014.pdf
      page: 56
  reference_answer: >
    The retrieved documents indicate that Soviet defector Yuri Nosenko told U.S. investigators that
    Oswald was not a Soviet agent, as cited in coverage referencing the Warren Commission. However,
    CIA officer John Scelso said he later heard that Nosenko "was discovered to have been dissembling,
    not being on the level," a view imparted to him by CIA officers. The retrieved previews therefore
    show a divided or unresolved U.S. intelligence assessment of Oswald's Soviet connections rather
    than presenting a single definitive conclusion.
  key_facts:
    - "Yuri Nosenko, a Soviet defector, told investigators Oswald was not a Soviet agent"
    - "CIA officer Scelso later heard Nosenko was 'dissembling' per other CIA officers"
    - "The U.S. intelligence view of Nosenko's credibility was divided"

- id: analytical_garrison_theory
  category: analytical
  question: "How is Jim Garrison's conspiracy theory characterized in the retrieved documents, both by himself and by his critics?"
  query_type_expected: research
  reference_evidence:
    - filename: 124-10273-10289_redacted.pdf
      page: 640
    - filename: 104-10305-10000.pdf
      page: 106
    - filename: 104-10305-10000.pdf
      page: 114
    - filename: 104-10337-10001.pdf
      page: 195
  reference_answer: >
    According to the retrieved documents, Garrison's theory was that David William Ferrie, Clay
    Shaw, and Lee Harvey Oswald had conspired with anti-Castro Cubans to assassinate President
    Kennedy; he later publicly framed the assassination as "an operation conducted by elements of
    the CIA." His investigation, begun in December 1966, drew on information from sources such as
    Jack S. Martin and David Lewis, and culminated in the prosecution of Clay Shaw (1966-1969).
    Critics were sharply unfavorable: his own former chief investigator, William H. Gurvich, swore
    under oath that Garrison's entire "plot" was "a figment of the D.A.'s imagination" and a
    "baseless fraud," and New Orleans press figures including Gordon Novel publicly disputed his
    claims.
  key_facts:
    - "Garrison theorized that Ferrie, Clay Shaw, Oswald, and anti-Castro Cubans conspired to kill Kennedy"
    - "Garrison publicly claimed the assassination was a CIA operation"
    - "His investigation relied on sources including Jack S. Martin and David Lewis"
    - "William H. Gurvich, his former chief investigator, testified the theory was a 'baseless fraud'"
    - "The investigation resulted in the prosecution of Clay Shaw"

- id: analytical_oswald_cuba_connections
  category: analytical
  question: "What connections between Oswald and Cuban-related activities do the retrieved documents establish?"
  query_type_expected: research
  reference_evidence:
    - filename: 157-10014-10242.pdf
      page: 165
    - filename: 180-10106-10008.pdf
      page: 1
    - filename: 104-10337-10001.pdf
      page: 162
    - filename: 104-10413-10306.pdf
      page: 35
  reference_answer: >
    The retrieved documents show several distinct Cuba-related threads involving Oswald. First,
    Oswald was associated with the Fair Play for Cuba Committee; Bureau documents indicate the CIA
    had taken an interest in that Committee and was considering disinformation that might embarrass
    it. Second, an HSCA record (04/14/1978, originator Phillip Geraci) concerns Oswald's post-Russian
    political and subversive activities and names Carlos Bringuier and Vance Blalock. Third, on
    27 September 1963 Oswald personally visited the Cuban Embassy in Mexico City to request a transit
    visa to Cuba on his way to the USSR. Additional commentary frames Oswald as a "Soviet defector
    and Fair Play for Cuba Committee activist" in discussions of the FBI's apparent lack of interest
    in him.
  key_facts:
    - "Oswald was associated with the Fair Play for Cuba Committee"
    - "The CIA considered disinformation against the Fair Play for Cuba Committee"
    - "An HSCA record links Oswald to Carlos Bringuier and Vance Blalock"
    - "Oswald visited the Cuban Embassy in Mexico City on 27 September 1963 seeking a transit visa"

