    - "The memo calls the question of CIA Office of Operations contact with Oswald 'one of the enigmas' with 'somewhat contradictory' evidence"
    - "CIA officer Scelso called Oswald a 'small-potatoes defector'"
    - "The previews do not establish an operational CIA-Oswald connection"

- id: partial_evidence_organized_crime_role
  category: partial_evidence
  question: "What role, if any, did organized crime play in the Kennedy assassination according to the retrieved documents?"
  query_type_expected: research
  reference_evidence:
    - filename: 104-10333-10001.pdf
      page: 107
    - filename: 157-10014-10242.pdf
      page: 462
    - filename: 157-10014-10242.pdf
      page: 44
  reference_answer: >
    The retrieved documents do not provide a definitive finding of organized-crime responsibility,
    but they reflect that this theory was seriously discussed by investigators and authors. A law
    review footnote cites G. Robert Blakey & Richard Billings, "The Plot to Kill the President"
    (1981), as "explaining the conclusion of the Select Committee on Assassinations that organized
    crime was behind the plot to kill JFK," and John Davis's "Mafia Kingfish" examining the theory
    that the New Orleans Mafia, led by Carlos Marcello, was responsible. The previews also link
    Mafia figure Santos Trafficante to CIA-backed plots against Castro and describe Jim Braden as
    having an "old Mafia friend," Roger Bauman, among his associates around the Hunt offices on
    November 21. The material thus supports a documented organized-crime hypothesis while not
    conclusively proving it.
  key_facts:
    - "The HSCA reportedly concluded organized crime was behind the plot to kill JFK (per Blakey & Billings)"
    - "John Davis's 'Mafia Kingfish' examined the Carlos Marcello / New Orleans Mafia theory"
    - "Santos Trafficante was linked to CIA-Mafia plots against Castro"
    - "Jim Braden's associate Roger Bauman is described as his 'old Mafia friend'"
    - "The previews do not provide a definitive finding of organized-crime responsibility"

