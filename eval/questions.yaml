- id: biographical_silvia_duran
  category: biographical
  question: "Who was Silvia Duran?"
  query_type_expected: simple
  reference_evidence:
    - filename: 144-10001-10099.pdf
      page: 2
    - filename: 180-10110-10484.pdf
      page: 247
    - filename: 180-10110-10484.pdf
      page: 306
  reference_answer: >
    Silvia Duran was an employee of the Cuban Consulate in Mexico City and the wife of Horatio
    Duran. She handled Lee Harvey Oswald's request for a transit visa during his late September /
    early October 1963 visit to Mexico City, and stated she was certain that Oswald signed the visa
    application in her presence. A Cuban diplomatic note of protest to Mexico, dated 29 November 1963,
    also addressed the "maltreatment" of Duran in the course of her arrest in connection with the
    Oswald visa request.
  key_facts:
