- id: factual_oswald_mexico_cuban_embassy
  category: factual
  question: "On what date did Oswald visit the Cuban Embassy in Mexico City to request a transit visa?"
  query_type_expected: simple
  reference_evidence:
    - filename: 104-10413-10306.pdf
      page: 35
    - filename: 144-10001-10125.pdf
      page: 18
  reference_answer: >
    Oswald went to the Cuban Embassy in Mexico City on September 27, 1963 and made an appointment
    for a visa to Cuba on his way to the USSR. On the same day, he also visited the Soviet Embassy
    to get a letter of recommendation, but was refused because they did not know who he was. Cuban
    authorities (MINREX, Havana) later confirmed the request for a transit visa to the USSR made
    through the Cuban Consulate.
  key_facts:
    - "Oswald visited the Cuban Embassy in Mexico City on 27 September 1963"
    - "He requested a visa to Cuba on his way to the USSR"
    - "He also visited the Soviet Embassy the same day"
    - "The Soviet Embassy refused to issue a letter of recommendation because they did not know him"

