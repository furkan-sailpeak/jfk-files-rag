- id: factual_oswald_marine_clearance
  category: factual
  question: "What level of security clearance did Lee Harvey Oswald hold during his Marine Corps service?"
  query_type_expected: simple
  reference_evidence:
    - filename: 180-10104-10354.pdf
      page: 13
    - filename: 180-10078-10492.pdf
      page: 5
  reference_answer: >
    According to a 1978 fact sheet on Oswald's Marine Corps service, his level of security clearance
    was "confidential." A Security Termination Statement (OPNAV FORM 5511-14) was executed by Oswald
    on September 11, 1959. A fellow Marine, Richard Dennis Call, also recalled that Oswald held the
    same security clearance as everyone else in his unit.
  key_facts:
    - "Oswald's Marine Corps security clearance was 'confidential'"
    - "A Security Termination Statement was executed by Oswald on September 11, 1959"
    - "This is documented in a 1978 fact sheet on Oswald's Marine Corps service"

- id: factual_ruby_real_name
