- id: biographical_oswald
  category: biographical
  question: "Who was Lee Harvey Oswald?"
  query_type_expected: simple
  reference_evidence:
    - filename: 104-10332-10014.pdf
      page: 56
    - filename: 180-10104-10354.pdf
      page: 13
    - filename: 180-10072-10186.pdf
      page: 46
  reference_answer: >
    Lee Harvey Oswald was identified by the Warren Commission as the assassin of President John F.
    Kennedy. Before the assassination, CIA Headquarters information on Oswald consisted chiefly of
    the facts that he had served in the Marine Corps and had defected to the Soviet Union and then
    returned. He held a "confidential" Marine Corps security clearance and was discharged in 1959
    following a hardship/dependency discharge board proceeding. In September 1963 he traveled to
    Mexico City and contacted both the Cuban and Soviet Embassies.
  key_facts:
    - "Oswald was identified by the Warren Commission as Kennedy's assassin"
    - "Oswald served in the U.S. Marine Corps"
    - "Oswald defected to the Soviet Union and later returned"
    - "In September 1963 he visited the Cuban and Soviet Embassies in Mexico City"

