- id: partial_evidence_oswald_acted_alone
  category: partial_evidence
  question: "Do the retrieved documents support the conclusion that Oswald acted alone in the assassination?"
  query_type_expected: research
  reference_evidence:
    - filename: 104-10332-10009.pdf
      page: 68
    - filename: 180-10110-10484.pdf
      page: 313
    - filename: 104-10433-10209.pdf
      page: 255
  reference_answer: >
    The retrieved previews do not supply a direct, affirmative endorsement of the "lone gunman"
    conclusion. They note that surveys show most Americans doubt Oswald acted alone and reference
    Gerald Posner's position that the original Dictabelt acoustic evidence for a fourth shot was
    flawed per the National Academy of Sciences review. Other previews raise unresolved questions -
    for example, the possibility that "someone did impersonate Oswald in Mexico" which investigators
    said "cannot be" ruled out, and Psychological Stress Evaluator results that did not substantiate
    some Dallas police claims about evidence handling. The documents therefore present contested
    material rather than a clean confirmation of the lone-gunman thesis.
  key_facts:
    - "Previews do not contain a direct affirmative endorsement of the lone-gunman conclusion"
    - "Posner/NAS review rejected the Dictabelt fourth-shot evidence"
    - "An HSCA-related document says the possibility someone impersonated Oswald in Mexico could not be ruled out"
    - "Most Americans per surveys doubt Oswald acted alone"

- id: partial_evidence_cuban_involvement
  category: partial_evidence
  question: "Was the Cuban government involved in the assassination of President Kennedy?"
  query_type_expected: research
  reference_evidence:
    - filename: 104-10333-10001.pdf
      page: 114
    - filename: 157-10014-10242.pdf
      page: 463
    - filename: 157-10014-10242.pdf
      page: 462
  reference_answer: >
    The retrieved documents do not establish Cuban governmental involvement in the assassination.
    They record that President Lyndon Johnson expressed his belief that Castro "could have planned"
    the assassination in retaliation, citing a 1975 CBS Evening News interview, and they note that
    U.S. efforts to assassinate Castro - including plots involving Mafia figures such as Santos
    Trafficante of Tampa - had been closely held within the CIA and FBI before eventual disclosure
    by the Senate intelligence committee. The previews thus document speculation and the retaliation
    hypothesis rather than a confirmed Cuban state role.
  key_facts:
    - "LBJ believed Castro could have planned the assassination in retaliation"
    - "LBJ's belief was cited from a 1975 CBS Evening News interview"
    - "CIA-Mafia plots against Castro (involving Santos Trafficante) were secret until Senate disclosure"
    - "The previews do not establish Cuban governmental involvement in the assassination"

